# TokenIQ — local stack
#   docker compose up --build
#   gateway API  -> http://localhost:8000   (/metrics, /v1/chat/completions)
#   visual demo  -> http://localhost:8080
#
# State is in-memory today (matches the current code). To match the reference
# architecture, add the redis + postgres services sketched at the bottom and
# point control_plane state at them — see ARCHITECTURE.md.

services:
  gateway:
    build: .
    container_name: ctrl-plane-gateway
    ports:
      - "8000:8000"
    restart: unless-stopped

  demo:
    image: python:3.12-slim
    container_name: ctrl-plane-demo
    working_dir: /site
    volumes:
      - ./control_plane_demo.html:/site/index.html:ro
    command: python -m http.server 8080
    ports:
      - "8080:8080"
    restart: unless-stopped

